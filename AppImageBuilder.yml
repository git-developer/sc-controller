version: 1

script:
- |
  mv "{{APPIMAGE_SOURCE}}" "${TARGET_APPDIR}"
  # Manual installation of squashfs-tools is required
  # until https://github.com/AppImageCrafters/build-appimage/issues/5 is fixed
  if ! command -v mksquashfs >/dev/null; then
    apt-get update && apt-get install -y --no-install-recommends squashfs-tools
  fi

AppDir:
  app_info:
    id: org.ryochan7.sc-controller
    name: sc-controller
    version: "{{APPIMAGE_VERSION}}"
    icon: sc-controller
    exec: bin/bash
    exec_args: '${APPDIR}/usr/bin/appimage-AppRun.sh ${@}'

  after_bundle: |
    # Add missing commands that are used in shebangs of bundled files
    [ -e "${TARGET_APPDIR}/bin/sh" ] || ln -sfr "${TARGET_APPDIR}/bin/bash" "${TARGET_APPDIR}/bin/sh"
    [ -e "${TARGET_APPDIR}/bin/dash" ] || ln -sfr "${TARGET_APPDIR}/bin/bash" "${TARGET_APPDIR}/bin/dash"
    if [ ! -e "${TARGET_APPDIR}/usr/local/bin/python" ]; then
      mkdir -p "${TARGET_APPDIR}/usr/local/bin"
      ln -sfr "${TARGET_APPDIR}/usr/bin/python3" "${TARGET_APPDIR}/usr/local/bin/python"
    fi

    # appimage-builder expects utf-8 when patching shebangs
    file="${TARGET_APPDIR}/usr/bin/pygettext3.10"
    encoding="ISO-8859-1"
    if file -bi "${file}" | grep -iq "${encoding}"; then
      <"${file}" iconv -f "${encoding}" -t utf-8 -o "${file}"
    fi

  before_runtime: |
    # Name of .desktop file is expected to start with appinfo id
    path="${TARGET_APPDIR}/usr/share/applications"
    ln -sr "${path}/sc-controller.desktop" "${path}/org.ryochan7.sc-controller.desktop"

  apt:
    arch:
      - "{{APPIMAGE_APT_ARCH}}"
    sources:
      - sourceline: deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ "{{APPIMAGE_APT_DISTRO}}" main universe
        key_url: "http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x{{APPIMAGE_APT_PUBKEY}}"
      - sourceline: deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ "{{APPIMAGE_APT_DISTRO}}"-updates main universe
      - sourceline: deb [arch=amd64] http://security.ubuntu.com/ubuntu/ "{{APPIMAGE_APT_DISTRO}}"-security main universe
      - sourceline: deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ "{{APPIMAGE_APT_DISTRO}}" main universe
      - sourceline: deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ "{{APPIMAGE_APT_DISTRO}}"-updates main universe
      - sourceline: deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ "{{APPIMAGE_APT_DISTRO}}"-security main universe
    include:
      - bash
      - binutils         # required for detection of bluetooth library
      - coreutils        # provides /usr/bin/env
      - gir1.2-rsvg-2.0
      - libbluetooth3
      - librsvg2-common
      - python3-evdev
      - python3-gi-cairo
      - python3-pylibacl
      - python3-vdf
    exclude:
      - 'gcc*'
      - 'libblkid*'
      - 'libdb*'
      - 'libgcc*'
      - 'libicu*'
      - 'libmount*'
      - 'libncurses*'
      - 'libreadline*'
      - 'libssl*'
      - 'libstdc*'
      - 'libtirpc*'
      - 'readline*'
      - '*crypt*'
      - '*krb*'
      - '*sqlite*'

  files:
    exclude:
      - usr/share/man
      - usr/share/doc
      - usr/share/gtk-doc
      - usr/share/local
      - usr/share/thumbnailers
      - usr/share/icu
      - usr/lib/*/glib-2.0
      - usr/lib/*/gdk-pixbuf-2.0/*/loaders/libpixbufloader-[!s]*.so # only svg is required

  runtime:
    env:
      PYTHONPATH: '${APPDIR}/usr/lib/python3/dist-packages:${PYTHONPATH}'
      GI_TYPELIB_PATH: '${APPDIR}/usr/lib/{{APPIMAGE_ARCH}}-linux-gnu/girepository-1.0'

AppImage:
  arch: "{{APPIMAGE_ARCH}}"
  update-information: "gh-releases-zsync|Ryochan7|sc-controller|latest|sc-controller-*.glibc-{{APPIMAGE_ARCH}}.AppImage.zsync"
