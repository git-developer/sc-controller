version: 1

script:
- |
  mv "{{APPIMAGE_SOURCE}}" "${TARGET_APPDIR}"
  # Manual installation is required until fix of https://github.com/AppImageCrafters/build-appimage/issues/5
  if ! command -v mksquashfs >/dev/null; then
    apt-get update && apt-get install -y --no-install-recommends squashfs-tools
  fi

AppDir:
  app_info:
    id: org.ryochan7.sc-controller
    name: sc-controller
    version: "{{APPIMAGE_VERSION}}"
    icon: sc-controller
    exec: bin/bash
    exec_args: entrypoint $@

  apt:
    arch:
      - "{{APPIMAGE_APT_ARCH}}"
    sources:
      - sourceline: deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ "{{APPIMAGE_APT_DISTRO}}" main universe
        key_url: "http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x{{APPIMAGE_APT_PUBKEY}}"
      - sourceline: deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ "{{APPIMAGE_APT_DISTRO}}"-updates main universe
      - sourceline: deb [arch=amd64] http://security.ubuntu.com/ubuntu/ "{{APPIMAGE_APT_DISTRO}}"-security main universe
      - sourceline: deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ "{{APPIMAGE_APT_DISTRO}}" main universe
      - sourceline: deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ "{{APPIMAGE_APT_DISTRO}}"-updates main universe
      - sourceline: deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ "{{APPIMAGE_APT_DISTRO}}"-security main universe
    include:
      - bash
      - python3-evdev
      - python3-pylibacl
      - python3-vdf
      - python3-gi
      - libpng16-16
      - libgdk-pixbuf-2.0-0
      - libxml2
#      - librsvg2-2
      - gir1.2-rsvg-2.0
#      - libicu70
      - libffi8
      - libcairo2
      - bluez
#      - binutils
#      - libelf1
#      - libjansson4
    exclude:
      - libc6
      - bash
      - python3
      - gcc-12-base
      - kmod

#   bash bluez gcc-12-base gir1.2-glib-2.0 kmod libacl1 libapparmor1 libargon2-1 libaudit-common libaudit1 libblkid1 libbrotli1 libbz2-1.0 libc6
#  libcairo-gobject2 libcairo2 libcap-ng0 libcap2 libcom-err2 libcrypt1 libcryptsetup12 libdatrie1 libdb5.3 libdbus-1-3 libdeflate0 libdevmapper1.02.1
#  libexpat1 libffi8 libfontconfig1 libfreetype6 libfribidi0 libgcc-s1 libgcrypt20 libgdk-pixbuf-2.0-0 libgdk-pixbuf2.0-common libgirepository-1.0-1
#  libglib2.0-0 libgmp10 libgnutls30 libgpg-error0 libgraphite2-3 libgssapi-krb5-2 libharfbuzz0b libhogweed6 libicu70 libidn2-0 libip4tc2 libjbig0
#  libjpeg-turbo8 libjpeg8 libjson-c5 libk5crypto3 libkeyutils1 libkmod2 libkrb5-3 libkrb5support0 liblz4-1 liblzma5 libmount1 libmpdec3 libncursesw6
#  libnettle8 libnsl2 libp11-kit0 libpam0g libpango-1.0-0 libpangocairo-1.0-0 libpangoft2-1.0-0 libpcre2-8-0 libpcre3 libpixman-1-0 libpng16-16
#  libpython3-stdlib libpython3.10-minimal libpython3.10-stdlib libreadline8 librsvg2-2 libseccomp2 libselinux1 libsqlite3-0 libssl3 libstdc++6 libsystemd0
#  libtasn1-6 libthai-data libthai0 libtiff5 libtinfo6 libtirpc-common libtirpc3 libudev1 libunistring2 libuuid1 libwebp7 libxext6 libxml2 libxrender1 libzstd1
#  media-types python3 python3-evdev python3-gi python3-minimal python3-pylibacl python3-vdf python3.10 python3.10-minimal readline-common udev zlib1g



  files:
    exclude:
      - usr/share/man
      - usr/share/doc
      - usr/share/gtk-doc
      - usr/share/local
      - usr/share/thumbnailers
      - usr/share/icu
      - usr/lib/*/glib-2.0
      - usr/lib/*/gdk-pixbuf-2.0/*/loaders/libpixbufloader-*.so
      # ani bmp gif icns ico jasper jpeg qtif tga tiff
      - usr/lib/cmake

AppImage:
  arch: "{{APPIMAGE_ARCH}}"
  update-information: "gh-releases-zsync|Ryochan7|sc-controller|latest|sc-controller-*.glibc-{{APPIMAGE_ARCH}}.AppImage.zsync"
